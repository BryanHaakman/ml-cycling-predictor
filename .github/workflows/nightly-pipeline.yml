name: Nightly Data Fetch

on:
  schedule:
    # Runs at 21:00 UTC — after all European races finish and PCS results are published
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write
  actions: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore database from snapshot
        run: |
          if [ -f data/db_snapshot.sql.gz ]; then
            python scripts/load_db.py --force
          else
            echo "No snapshot found, starting fresh"
          fi

      - name: Fetch latest race data
        run: python scripts/update_races.py --all-tiers --no-settle

      - name: Dump database snapshot
        run: python scripts/dump_db.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db_snapshot.sql.gz
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: nightly snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
