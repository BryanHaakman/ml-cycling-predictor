<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaceIQ - Login</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --accent: #f5c518;
            --red: #ff5252;
            --text: #e8e8e8;
            --muted: #8a8d9b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-card h1 {
            font-size: 1.6rem;
            margin-bottom: 0.25rem;
        }
        .login-card h1 span { color: var(--accent); }
        .login-card p {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        input {
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            text-align: center;
            letter-spacing: 0.15em;
        }
        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--muted); letter-spacing: normal; }
        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        .error {
            color: var(--red);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Pace<span>IQ</span></h1>
        <p>Enter passcode to continue</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <input type="password" name="passcode" placeholder="Passcode" autofocus required>
            </div>
            <button type="submit">Enter</button>
        </form>
    </div>
</body>
</html>
