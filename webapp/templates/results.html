<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Browser — Cycling H2H</title>
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
            --accent: #f5c518; --green: #00c853; --red: #ff5252;
            --blue: #448aff; --text: #e8e8e8; --muted: #8a8d9b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
        header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
        header h1 span { color: var(--accent); }
        header nav a { color: var(--muted); text-decoration: none; margin: 0 0.5rem; font-size: 0.9rem; }
        header nav a:hover { color: var(--text); }
        header nav a.active { color: var(--accent); }

        /* Search & filters */
        .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .search-bar input, .search-bar select {
            padding: 0.6rem 1rem; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.9rem;
        }
        .search-bar input { flex: 1; min-width: 200px; }
        .search-bar select { min-width: 100px; }
        .search-bar input:focus, .search-bar select:focus { outline: none; border-color: var(--accent); }

        /* Stats bar */
        .stats-bar { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; font-size: 0.8rem; color: var(--muted); flex-wrap: wrap; }
        .stats-bar .stat { display: flex; align-items: center; gap: 0.3rem; }
        .stats-bar .stat-val { color: var(--accent); font-weight: 600; }

        /* Breadcrumb */
        .breadcrumb { margin-bottom: 1rem; font-size: 0.85rem; }
        .breadcrumb a { color: var(--blue); text-decoration: none; cursor: pointer; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { color: var(--muted); margin: 0 0.3rem; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.6rem 0.5rem; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
        th:hover { color: var(--text); }
        th .sort-arrow { margin-left: 0.2rem; font-size: 0.6rem; }
        td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(255,255,255,0.03); }
        .clickable { cursor: pointer; }
        .clickable:hover td { color: var(--accent); }

        /* Links */
        .link { color: var(--blue); cursor: pointer; text-decoration: none; }
        .link:hover { text-decoration: underline; }

        /* Profile icons */
        .profile-badge { display: inline-block; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .profile-p1 { background: rgba(0,200,83,0.15); color: var(--green); }
        .profile-p2 { background: rgba(68,138,255,0.15); color: var(--blue); }
        .profile-p3 { background: rgba(245,197,24,0.15); color: var(--accent); }
        .profile-p4 { background: rgba(255,152,0,0.15); color: #ff9800; }
        .profile-p5 { background: rgba(255,82,82,0.15); color: var(--red); }

        /* Race type badges */
        .badge { display: inline-block; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; }
        .badge-stage { background: rgba(68,138,255,0.15); color: var(--blue); }
        .badge-oneday { background: rgba(245,197,24,0.15); color: var(--accent); }
        .badge-itt { background: rgba(156,39,176,0.15); color: #ce93d8; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 1rem; }
        .pagination button {
            padding: 0.4rem 0.8rem; background: var(--card); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 0.8rem; cursor: pointer;
        }
        .pagination button:hover { border-color: var(--accent); }
        .pagination button:disabled { opacity: 0.3; cursor: default; }
        .pagination .page-info { font-size: 0.8rem; color: var(--muted); }

        /* Stage detail header */
        .stage-header { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
        .stage-header h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .stage-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.85rem; color: var(--muted); }
        .stage-meta .meta-item { display: flex; align-items: center; gap: 0.3rem; }
        .stage-meta .meta-val { color: var(--text); font-weight: 500; }

        /* Rider profile header */
        .rider-header { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
        .rider-header h2 { font-size: 1.2rem; margin-bottom: 0.3rem; }
        .rider-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
        .rider-stats .stat-item span { color: var(--text); font-weight: 500; }

        /* Specialty bars */
        .specialty-bars { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
        .spec-bar { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: var(--border); }
        .spec-bar .spec-val { color: var(--accent); font-weight: 600; margin-left: 0.2rem; }

        .empty-msg { text-align: center; color: var(--muted); padding: 3rem; font-size: 0.9rem; }

        /* Search results dropdown */
        .search-results { position: relative; }
        .search-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
            background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            max-height: 400px; overflow-y: auto; display: none; margin-top: 2px;
        }
        .search-dropdown.active { display: block; }
        .search-section { padding: 0.3rem 0.7rem; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .search-item { padding: 0.5rem 0.7rem; cursor: pointer; font-size: 0.85rem; }
        .search-item:hover { background: rgba(255,255,255,0.05); }
        .search-item .sub { font-size: 0.75rem; color: var(--muted); }

        @media (max-width: 700px) {
            .stage-meta, .rider-stats { flex-direction: column; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚴 Cycling H2H <span>Results Browser</span></h1>
            <nav>
                <a href="/">Predictions</a>
                <a href="/pnl">P&L Tracker</a>
                <a href="/results" class="active">Results</a>
            </nav>
        </header>

        <div id="stats-bar" class="stats-bar"></div>

        <div class="search-results">
            <div class="search-bar">
                <input type="text" id="global-search" placeholder="Search races or riders..." autocomplete="off">
                <select id="year-filter"><option value="">All Years</option></select>
            </div>
            <div class="search-dropdown" id="search-dropdown"></div>
        </div>

        <div id="breadcrumb" class="breadcrumb"></div>
        <div id="content"></div>
    </div>

<script>
const state = { view: 'races', page: 1, year: null, query: '', sortCol: null, sortDir: 'asc' };
const $ = id => document.getElementById(id);

// ── Stats ──
async function loadStats() {
    const s = await fetch('/api/stats').then(r => r.json());
    $('stats-bar').innerHTML = [
        ['Races', s.races], ['Stages', s.stages],
        ['Results', s.results?.toLocaleString()], ['Riders', s.riders],
        ['Years', s.year_range]
    ].map(([l,v]) => `<div class="stat">${l}: <span class="stat-val">${v}</span></div>`).join('');
}

// ── Search ──
let searchTimeout;
$('global-search').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    const q = e.target.value.trim();
    if (q.length < 2) { $('search-dropdown').classList.remove('active'); return; }
    searchTimeout = setTimeout(() => globalSearch(q), 250);
});

$('global-search').addEventListener('blur', () => {
    setTimeout(() => $('search-dropdown').classList.remove('active'), 200);
});

async function globalSearch(q) {
    const data = await fetch(`/api/results/search?q=${encodeURIComponent(q)}`).then(r => r.json());
    const dd = $('search-dropdown');
    let html = '';
    if (data.races.length) {
        html += '<div class="search-section">Races</div>';
        data.races.forEach(r => {
            html += `<div class="search-item" onclick="viewRace('${r.url}')">${r.name} <span class="sub">(${r.year})</span></div>`;
        });
    }
    if (data.riders.length) {
        html += '<div class="search-section">Riders</div>';
        data.riders.forEach(r => {
            html += `<div class="search-item" onclick="viewRider('${r.url}')">${r.name} <span class="sub">${r.nationality || ''} · ${r.race_count} results</span></div>`;
        });
    }
    if (!data.races.length && !data.riders.length) html = '<div class="empty-msg">No results found</div>';
    dd.innerHTML = html;
    dd.classList.add('active');
}

// ── Year filter ──
$('year-filter').addEventListener('change', e => {
    state.year = e.target.value ? parseInt(e.target.value) : null;
    state.page = 1;
    loadRaces();
});

// ── Profile badge helper ──
function profileBadge(icon) {
    if (!icon) return '';
    const labels = { p1: 'Flat', p2: 'Hills', p3: 'Hilly', p4: 'Mtn', p5: 'HM' };
    return `<span class="profile-badge profile-${icon}">${labels[icon] || icon}</span>`;
}

function typeBadge(isOneDay, stageType) {
    if (stageType && stageType.toUpperCase() === 'ITT') return '<span class="badge badge-itt">ITT</span>';
    if (stageType && stageType.toUpperCase() === 'TTT') return '<span class="badge badge-itt">TTT</span>';
    if (isOneDay) return '<span class="badge badge-oneday">One-Day</span>';
    return '<span class="badge badge-stage">Stage</span>';
}

// ── Breadcrumb ──
function updateBreadcrumb(parts) {
    $('breadcrumb').innerHTML = parts.map((p, i) =>
        i < parts.length - 1
            ? `<a onclick="${p.action}">${p.label}</a><span>›</span>`
            : `<strong>${p.label}</strong>`
    ).join(' ');
}

// ── Sortable table helper ──
function sortableHeader(cols, currentSort, currentDir) {
    return cols.map(([key, label, width]) => {
        const arrow = currentSort === key ? (currentDir === 'asc' ? '▲' : '▼') : '';
        const w = width ? ` style="width:${width}"` : '';
        return `<th onclick="sortBy('${key}')"${w}>${label} <span class="sort-arrow">${arrow}</span></th>`;
    }).join('');
}

let _currentData = [];
function sortBy(col) {
    if (state.sortCol === col) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    else { state.sortCol = col; state.sortDir = 'asc'; }
    renderCurrentView();
}

function sortData(data, col, dir) {
    if (!col) return data;
    return [...data].sort((a, b) => {
        let va = a[col], vb = b[col];
        if (va == null) va = dir === 'asc' ? Infinity : -Infinity;
        if (vb == null) vb = dir === 'asc' ? Infinity : -Infinity;
        if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        return dir === 'asc' ? va - vb : vb - va;
    });
}

// ── Views ──

// RACES LIST
async function loadRaces() {
    state.view = 'races';
    state.sortCol = null;
    updateBreadcrumb([{ label: 'All Races' }]);

    const params = new URLSearchParams({ page: state.page, per_page: 50 });
    if (state.year) params.set('year', state.year);

    const data = await fetch(`/api/results/races?${params}`).then(r => r.json());

    // Populate year dropdown
    const sel = $('year-filter');
    if (sel.options.length <= 1 && data.years?.length) {
        data.years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; sel.appendChild(o); });
    }

    _currentData = data.races;
    state._racesTotal = data.total;
    state._racesPerPage = data.per_page;
    renderCurrentView();
}

function renderRaces() {
    const races = sortData(_currentData, state.sortCol, state.sortDir);
    const cols = [['year','Year','60px'],['name','Race'],['category','Category','100px'],['is_one_day_race','Type','80px'],['stage_count','Stages','70px'],['result_count','Results','80px'],['startdate','Date','100px']];

    let html = `<table><thead><tr>${sortableHeader(cols, state.sortCol, state.sortDir)}</tr></thead><tbody>`;
    races.forEach(r => {
        const type = r.is_one_day_race ? '<span class="badge badge-oneday">One-Day</span>' : '<span class="badge badge-stage">Stage Race</span>';
        html += `<tr class="clickable" onclick="viewRace('${r.url}')">
            <td>${r.year}</td><td>${r.name || '—'}</td><td>${r.category || '—'}</td>
            <td>${type}</td><td>${r.stage_count}</td><td>${r.result_count}</td>
            <td>${r.startdate || '—'}</td></tr>`;
    });
    html += '</tbody></table>';

    // Pagination
    const totalPages = Math.ceil(state._racesTotal / state._racesPerPage);
    if (totalPages > 1) {
        html += `<div class="pagination">
            <button ${state.page <= 1 ? 'disabled' : ''} onclick="state.page--; loadRaces()">← Prev</button>
            <span class="page-info">Page ${state.page} of ${totalPages} (${state._racesTotal} races)</span>
            <button ${state.page >= totalPages ? 'disabled' : ''} onclick="state.page++; loadRaces()">Next →</button>
        </div>`;
    }
    $('content').innerHTML = html;
}

// RACE DETAIL (stages)
async function viewRace(raceUrl) {
    state.view = 'race';
    state.sortCol = null;
    $('search-dropdown').classList.remove('active');

    const data = await fetch(`/api/results/stages?race_url=${encodeURIComponent(raceUrl)}`).then(r => r.json());
    const race = data.race;

    updateBreadcrumb([
        { label: 'All Races', action: 'loadRaces()' },
        { label: `${race?.name || raceUrl} (${race?.year || ''})` }
    ]);

    _currentData = data.stages;
    state._currentRaceUrl = raceUrl;
    state._currentRace = race;
    renderCurrentView();
}

function renderRaceDetail() {
    const stages = sortData(_currentData, state.sortCol, state.sortDir);
    const race = state._currentRace;

    const cols = [['date','Date','90px'],['stage_name','Stage'],['departure','From','120px'],['arrival','To','120px'],['distance','Dist (km)','80px'],['vertical_meters','Vert (m)','80px'],['profile_icon','Profile','70px'],['stage_type','Type','60px'],['finishers','Riders','60px']];

    let html = `<table><thead><tr>${sortableHeader(cols, state.sortCol, state.sortDir)}</tr></thead><tbody>`;
    stages.forEach(s => {
        html += `<tr class="clickable" onclick="viewStage('${s.url}', '${state._currentRaceUrl}')">
            <td>${s.date || '—'}</td><td>${s.stage_name || '—'}</td>
            <td>${s.departure || '—'}</td><td>${s.arrival || '—'}</td>
            <td>${s.distance ? s.distance.toFixed(1) : '—'}</td>
            <td>${s.vertical_meters ? Math.round(s.vertical_meters) : '—'}</td>
            <td>${profileBadge(s.profile_icon)}</td>
            <td>${typeBadge(false, s.stage_type)}</td>
            <td>${s.finishers || 0}</td></tr>`;
    });
    html += '</tbody></table>';
    if (!stages.length) html = '<div class="empty-msg">No stages found for this race</div>';
    $('content').innerHTML = html;
}

// STAGE RESULTS
async function viewStage(stageUrl, raceUrl) {
    state.view = 'stage';
    state.sortCol = null;
    $('search-dropdown').classList.remove('active');

    const data = await fetch(`/api/results/stage?stage_url=${encodeURIComponent(stageUrl)}`).then(r => r.json());
    const st = data.stage;

    updateBreadcrumb([
        { label: 'All Races', action: 'loadRaces()' },
        { label: state._currentRace?.name || '...', action: `viewRace('${raceUrl || ''}')` },
        { label: st?.stage_name || stageUrl }
    ]);

    // Stage header
    let headerHtml = '';
    if (st) {
        headerHtml = `<div class="stage-header">
            <h2>${st.stage_name || 'Stage'} ${profileBadge(st.profile_icon)}</h2>
            <div class="stage-meta">
                ${st.date ? `<div class="meta-item">📅 <span class="meta-val">${st.date}</span></div>` : ''}
                ${st.departure && st.arrival ? `<div class="meta-item">📍 <span class="meta-val">${st.departure} → ${st.arrival}</span></div>` : ''}
                ${st.distance ? `<div class="meta-item">📏 <span class="meta-val">${st.distance.toFixed(1)} km</span></div>` : ''}
                ${st.vertical_meters ? `<div class="meta-item">⛰️ <span class="meta-val">${Math.round(st.vertical_meters)} m</span></div>` : ''}
                ${st.avg_speed_winner ? `<div class="meta-item">💨 <span class="meta-val">${st.avg_speed_winner.toFixed(1)} km/h</span></div>` : ''}
                ${st.avg_temperature ? `<div class="meta-item">🌡️ <span class="meta-val">${st.avg_temperature}°C</span></div>` : ''}
                ${st.num_climbs ? `<div class="meta-item">🏔️ <span class="meta-val">${st.num_climbs} climbs</span></div>` : ''}
            </div>
        </div>`;
    }

    _currentData = data.results;
    state._currentStageUrl = stageUrl;
    state._currentRaceUrl = raceUrl;

    $('content').innerHTML = headerHtml + '<div id="stage-table"></div>';
    renderStageResults();
}

function renderStageResults() {
    const results = sortData(_currentData, state.sortCol, state.sortDir);
    const cols = [['rank','#','40px'],['rider_name','Rider'],['team_name','Team'],['nationality','Nat','50px'],['age','Age','40px'],['time_str','Time','90px'],['pcs_points','PCS','55px'],['uci_points','UCI','55px'],['breakaway_kms','BRK','55px']];

    let html = `<table><thead><tr>${sortableHeader(cols, state.sortCol, state.sortDir)}</tr></thead><tbody>`;
    results.forEach((r, i) => {
        const rankDisplay = r.rank || (r.status || 'DNF');
        const rowClass = r.rank === 1 ? 'style="color:var(--accent);font-weight:600"' : r.rank && r.rank <= 3 ? 'style="color:var(--green)"' : '';
        html += `<tr ${rowClass}>
            <td>${rankDisplay}</td>
            <td><a class="link" onclick="viewRider('${r.rider_url}')">${r.rider_name || '—'}</a></td>
            <td>${r.team_name || '—'}</td>
            <td>${r.nationality || '—'}</td>
            <td>${r.age || '—'}</td>
            <td>${r.time_str || '—'}</td>
            <td>${r.pcs_points || '—'}</td>
            <td>${r.uci_points || '—'}</td>
            <td>${r.breakaway_kms ? r.breakaway_kms.toFixed(0) : '—'}</td></tr>`;
    });
    html += '</tbody></table>';
    if (!results.length) html = '<div class="empty-msg">No results for this stage</div>';

    const target = document.getElementById('stage-table') || $('content');
    target.innerHTML = html;
}

// RIDER RESULTS
async function viewRider(riderUrl) {
    state.view = 'rider';
    state.sortCol = null;
    state.page = 1;
    $('search-dropdown').classList.remove('active');

    const data = await fetch(`/api/results/rider?rider_url=${encodeURIComponent(riderUrl)}&per_page=200`).then(r => r.json());
    const rider = data.rider;

    updateBreadcrumb([
        { label: 'All Races', action: 'loadRaces()' },
        { label: rider?.name || riderUrl }
    ]);

    // Rider header
    let headerHtml = '';
    if (rider) {
        const specs = [
            ['One-Day', rider.specialty_one_day], ['GC', rider.specialty_gc],
            ['TT', rider.specialty_tt], ['Sprint', rider.specialty_sprint],
            ['Climber', rider.specialty_climber], ['Hills', rider.specialty_hills]
        ].filter(([,v]) => v > 0);

        headerHtml = `<div class="rider-header">
            <h2>${rider.name} ${rider.nationality ? `<span style="font-size:0.8rem;color:var(--muted)">${rider.nationality}</span>` : ''}</h2>
            <div class="rider-stats">
                ${rider.birthdate ? `<div class="stat-item">Born: <span>${rider.birthdate}</span></div>` : ''}
                ${rider.weight ? `<div class="stat-item">Weight: <span>${rider.weight} kg</span></div>` : ''}
                ${rider.height ? `<div class="stat-item">Height: <span>${rider.height} m</span></div>` : ''}
                <div class="stat-item">Results: <span>${data.total}</span></div>
            </div>
            ${specs.length ? `<div class="specialty-bars">${specs.map(([l,v]) => `<span class="spec-bar">${l}<span class="spec-val">${v}</span></span>`).join('')}</div>` : ''}
        </div>`;
    }

    _currentData = data.results;
    state._currentRiderUrl = riderUrl;

    $('content').innerHTML = headerHtml + '<div id="rider-table"></div>';
    renderRiderResults();
}

function renderRiderResults() {
    const results = sortData(_currentData, state.sortCol, state.sortDir);
    const cols = [['date','Date','90px'],['race_name','Race'],['stage_name','Stage'],['rank','#','40px'],['team_name','Team'],['pcs_points','PCS','55px'],['uci_points','UCI','55px'],['distance','Dist','60px'],['profile_icon','Profile','65px']];

    let html = `<table><thead><tr>${sortableHeader(cols, state.sortCol, state.sortDir)}</tr></thead><tbody>`;
    results.forEach(r => {
        const rankDisplay = r.rank || (r.status || 'DNF');
        const rowClass = r.rank === 1 ? 'style="color:var(--accent);font-weight:600"' : r.rank && r.rank <= 3 ? 'style="color:var(--green)"' : '';
        html += `<tr ${rowClass}>
            <td>${r.date || '—'}</td>
            <td><a class="link" onclick="viewRace('${r.race_url}')">${r.race_name || '—'}</a></td>
            <td>${r.stage_name || '—'}</td>
            <td>${rankDisplay}</td>
            <td>${r.team_name || '—'}</td>
            <td>${r.pcs_points || '—'}</td>
            <td>${r.uci_points || '—'}</td>
            <td>${r.distance ? r.distance.toFixed(0) : '—'}</td>
            <td>${profileBadge(r.profile_icon)}</td></tr>`;
    });
    html += '</tbody></table>';
    if (!results.length) html = '<div class="empty-msg">No results found for this rider</div>';

    const target = document.getElementById('rider-table') || $('content');
    target.innerHTML = html;
}

// ── Router ──
function renderCurrentView() {
    switch(state.view) {
        case 'races': renderRaces(); break;
        case 'race': renderRaceDetail(); break;
        case 'stage': renderStageResults(); break;
        case 'rider': renderRiderResults(); break;
    }
}

// ── Init ──
loadStats();
loadRaces();
</script>
</body>
</html>
