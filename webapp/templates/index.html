<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycling H2H Predictor</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --accent: #f5c518;
            --green: #00c853;
            --red: #ff5252;
            --blue: #448aff;
            --text: #e8e8e8;
            --muted: #8a8d9b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
        header h1 span { color: var(--accent); }
        header p { color: var(--muted); font-size: 0.9rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            padding: 0.7rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--muted); }

        .autocomplete-wrap { position: relative; }
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto;
            z-index: 10; display: none;
        }
        .autocomplete-list.active { display: block; }
        .autocomplete-item {
            padding: 0.6rem 1rem; cursor: pointer;
            font-size: 0.9rem; border-bottom: 1px solid var(--border);
        }
        .autocomplete-item:hover { background: #252836; }
        .autocomplete-item small { color: var(--muted); margin-left: 0.5rem; }

        .odds-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .odds-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 1rem;
        }
        .odds-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }

        .btn {
            width: 100%; padding: 0.9rem;
            background: var(--accent); color: #000;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
            margin-bottom: 1.5rem;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Results */
        #results { display: none; }
        .results-header {
            text-align: center; margin-bottom: 1.5rem;
            font-size: 0.8rem; color: var(--muted); text-transform: uppercase;
        }
        .matchup {
            display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem;
            align-items: start; margin-bottom: 2rem;
        }
        .rider-card {
            background: var(--card); border-radius: 12px;
            padding: 1.5rem; text-align: center;
            border: 2px solid var(--border); transition: border-color 0.3s;
        }
        .rider-card.winner { border-color: var(--green); }
        .rider-card .name { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .rider-card .prob {
            font-size: 2.2rem; font-weight: 800; margin: 0.5rem 0;
        }
        .rider-card.winner .prob { color: var(--green); }
        .rider-card .prob-label { font-size: 0.75rem; color: var(--muted); }

        .vs {
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700; color: var(--muted);
            padding-top: 2rem;
        }

        /* Kelly section */
        .kelly-section {
            background: var(--card); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1rem;
            border: 1px solid var(--border);
        }
        .kelly-section h3 {
            font-size: 0.85rem; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        .kelly-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .kelly-stat { text-align: center; }
        .kelly-stat .value {
            font-size: 1.4rem; font-weight: 700; display: block;
        }
        .kelly-stat .label {
            font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
        }
        .kelly-stat .value.positive { color: var(--green); }
        .kelly-stat .value.negative { color: var(--red); }
        .kelly-stat .value.neutral { color: var(--muted); }

        .kelly-verdict {
            margin-top: 1rem; padding: 0.8rem;
            border-radius: 8px; font-size: 0.9rem; text-align: center;
        }
        .kelly-verdict.bet { background: rgba(0, 200, 83, 0.1); border: 1px solid var(--green); color: var(--green); }
        .kelly-verdict.no-bet { background: rgba(255, 82, 82, 0.1); border: 1px solid var(--red); color: var(--red); }

        .stats-bar {
            text-align: center; padding: 1rem; color: var(--muted);
            font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 2rem;
        }
        .error-msg { color: var(--red); text-align: center; padding: 1rem; }
        .mode-btn {
            padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 0.8rem; transition: all 0.2s;
        }
        .mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        .mode-btn:hover:not(.active) { border-color: var(--muted); }

        /* Batch mode */
        .top-mode-toggle {
            display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem;
        }
        .top-mode-btn {
            padding: 0.55rem 1.4rem; border-radius: 8px; cursor: pointer;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 0.9rem; font-weight: 500; transition: all 0.2s;
        }
        .top-mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        .top-mode-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

        .batch-pair-row {
            display: grid; grid-template-columns: 1fr 1fr 100px 100px auto;
            gap: 0.5rem; align-items: end; margin-bottom: 0.5rem;
        }
        .batch-pair-row .form-group { gap: 0.2rem; }
        .batch-pair-row label { font-size: 0.7rem; }
        .batch-pair-row input { padding: 0.55rem 0.7rem; font-size: 0.85rem; }
        .batch-pair-row .remove-pair-btn {
            background: transparent; border: 1px solid var(--border); color: var(--red);
            border-radius: 6px; cursor: pointer; padding: 0.55rem 0.6rem; font-size: 0.9rem;
            transition: all 0.2s; align-self: end;
        }
        .batch-pair-row .remove-pair-btn:hover { background: rgba(255,82,82,0.15); border-color: var(--red); }
        .batch-actions { display: flex; gap: 0.5rem; margin: 1rem 0 1.5rem; flex-wrap: wrap; }
        .batch-actions .btn { width: auto; flex: 1; min-width: 140px; }
        .btn-secondary {
            background: var(--card); color: var(--text); border: 1px solid var(--border);
            padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-secondary:hover { border-color: var(--accent); }
        .btn-success { background: var(--green); color: #000; }
        .btn-success:hover { opacity: 0.85; }
        .btn-success:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Batch results table */
        .batch-results-table {
            width: 100%; border-collapse: collapse; font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .batch-results-table th {
            background: var(--card); color: var(--muted); text-transform: uppercase;
            font-size: 0.7rem; letter-spacing: 0.5px; padding: 0.7rem 0.5rem;
            border-bottom: 1px solid var(--border); text-align: left;
        }
        .batch-results-table td {
            padding: 0.65rem 0.5rem; border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .batch-results-table tr:hover { background: rgba(255,255,255,0.02); }
        .batch-results-table .value-yes { color: var(--green); font-weight: 600; }
        .batch-results-table .value-no { color: var(--muted); }
        .batch-results-table .winner-cell { color: var(--green); font-weight: 600; }
        .batch-results-table .edge-positive { color: var(--green); }
        .batch-results-table .edge-negative { color: var(--red); }
        .batch-summary {
            background: var(--card); border-radius: 10px; padding: 1rem 1.5rem;
            border: 1px solid var(--border); margin-bottom: 1rem;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem;
            text-align: center;
        }
        .batch-summary .stat-value { font-size: 1.3rem; font-weight: 700; display: block; }
        .batch-summary .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }

        @media (max-width: 600px) {
            .form-grid, .odds-section, .matchup { grid-template-columns: 1fr; }
            .vs { padding: 0.5rem 0; }
            .batch-pair-row { grid-template-columns: 1fr 1fr; }
            .batch-pair-row .form-group:nth-child(3),
            .batch-pair-row .form-group:nth-child(4) { }
        }

        .pinnacle-row {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .unresolved-rider input,
        .unresolved-rider .autocomplete-wrap > input {
            border-color: #ff9800;
        }
        .stake-input {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.85rem;
            width: 80px;
        }
        .stake-input:focus {
            border-color: var(--accent);
            outline: none;
        }
        .book-btn { min-width: 80px; }
        .inline-error {
            color: var(--red);
            font-size: 0.85rem;
            display: block;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚴 Cycling <span>H2H</span> Predictor</h1>
            <p>ML-powered head-to-head predictions with Kelly Criterion staking</p>
            <nav style="margin-top:0.5rem;"><a href="/" style="color:var(--accent);text-decoration:none;margin-right:1rem;">Predictions</a><a href="/results" style="color:var(--muted);text-decoration:none;margin-right:1rem;">Results</a><a href="/pnl" style="color:var(--muted);text-decoration:none;margin-right:1rem;">P&L Tracker</a><a href="/admin" style="color:var(--muted);text-decoration:none;">Admin</a></nav>
        </header>

        <!-- Single H2H removed — Batch H2H is the primary workflow -->

    <!-- ── Batch Mode ────────────────────────────────────────────── -->
    <div id="batch-mode">
        <div class="pinnacle-row">
            <div class="form-group" style="flex:0 0 auto;">
                <label style="visibility:hidden;">Action</label>
                <button class="btn" id="load-pinnacle-btn" onclick="loadFromPinnacle()">Load from Pinnacle</button>
            </div>
            <div class="form-group" id="pinnacle-race-picker" style="display:none;flex:1;min-width:200px;">
                <label>Race</label>
                <select id="pinnacle-race-select" onchange="onPinnacleRaceChange()" style="width:100%;padding:0.5rem 0.8rem;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem;">
                    <option value="">-- Select a Race --</option>
                </select>
            </div>
        </div>
        <div class="form-group full" style="margin-bottom:1.5rem;">
            <label>Race Setup</label>
            <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;align-items:center;flex-wrap:wrap;">
                <select id="batch-saved-race-select" style="flex:1;min-width:200px;padding:0.5rem 0.8rem;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem;">
                    <option value="">— Select Saved Race or Enter Below —</option>
                </select>
            </div>
            <div id="batch-race-fields" style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">
                <div class="form-group">
                    <label>Race Name</label>
                    <input type="text" id="batch-race-name" placeholder="e.g. E3 Saxo Classic 2026">
                </div>
                <div class="form-group">
                    <label>Race Date</label>
                    <input type="date" id="batch-race-date">
                </div>
                <div class="form-group">
                    <label>Distance (km)</label>
                    <input type="number" id="batch-distance" placeholder="e.g. 200" step="0.1" min="0">
                </div>
                <div class="form-group">
                    <label>Vertical Metres</label>
                    <input type="number" id="batch-vert" placeholder="e.g. 3500" step="1" min="0">
                </div>
                <div class="form-group">
                    <label>Profile Type</label>
                    <select id="batch-profile">
                        <option value="p1">p1 — Flat</option>
                        <option value="p2">p2 — Hilly (flat finish)</option>
                        <option value="p3" selected>p3 — Hilly (uphill finish)</option>
                        <option value="p4">p4 — Mountain</option>
                        <option value="p5">p5 — Mountain (summit finish)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Stage Type</label>
                    <select id="batch-stage-type">
                        <option value="RR" selected>Road Race</option>
                        <option value="ITT">Individual Time Trial</option>
                        <option value="TTT">Team Time Trial</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>One-Day Race?</label>
                    <select id="batch-oneday">
                        <option value="0">No (stage race)</option>
                        <option value="1">Yes (one-day race)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Number of Climbs</label>
                    <input type="number" id="batch-climbs" placeholder="e.g. 5" step="1" min="0">
                </div>
                <div class="form-group">
                    <label>Race Tier (UCI Category)</label>
                    <select id="batch-uci-tour">
                        <option value="">Unknown / Other</option>
                        <option value="1.UWT">1.UWT — World Tour (1-day)</option>
                        <option value="2.UWT">2.UWT — World Tour (stage)</option>
                        <option value="WC">WC — World Championships</option>
                        <option value="1.Pro">1.Pro — ProSeries (1-day)</option>
                        <option value="2.Pro">2.Pro — ProSeries (stage)</option>
                        <option value="1.1">1.1 — Class 1</option>
                        <option value="2.1">2.1 — Class 1 (stage)</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Race Base URL (optional)</label>
                    <input type="text" id="batch-race-url" placeholder="e.g. race/e3-harelbeke">
                </div>
            </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <label style="font-size:0.85rem;font-weight:600;">H2H Pairs</label>
            <span id="batch-pair-count" style="color:var(--muted);font-size:0.8rem;">0 pairs</span>
        </div>

        <div id="batch-pair-header" class="batch-pair-row" style="margin-bottom:0.3rem;">
            <div><label>Rider A</label></div>
            <div><label>Rider B</label></div>
            <div><label>Odds A</label></div>
            <div><label>Odds B</label></div>
            <div></div>
        </div>
        <div id="batch-pairs-container"></div>

        <div class="batch-actions">
            <button class="btn-secondary" onclick="addBatchPair()">+ Add Pair</button>
            <button class="btn-secondary" onclick="addMultipleBatchPairs()">+ Add 5 Pairs</button>
            <button class="btn-secondary" onclick="clearBatchPairs()">🗑️ Clear All</button>
        </div>

        <button class="btn" id="batch-predict-btn" onclick="batchPredict()">⚡ Predict All H2H</button>

        <div id="batch-error" class="error-msg" style="display:none;"></div>

        <div id="batch-results" style="display:none;">
            <div class="results-header">Batch Prediction Results</div>
            <div class="batch-summary" id="batch-summary"></div>
            <div style="overflow-x:auto;">
                <table class="batch-results-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Rider A</th>
                            <th>Rider B</th>
                            <th>Prob A</th>
                            <th>Prob B</th>
                            <th>Predicted Winner</th>
                            <th>Odds</th>
                            <th>Edge</th>
                            <th>½ Kelly</th>
                            <th>Value?</th>
                            <th>Stake</th>
                        </tr>
                    </thead>
                    <tbody id="batch-results-body"></tbody>
                </table>
            </div>
            <button class="btn btn-success" id="submit-all-bets-btn" onclick="submitAllBets()" style="display:none;">Submit All Bets</button>
        </div>

        <div class="stats-bar" id="stats-bar-batch">Loading stats...</div>
    </div><!-- end batch-mode -->
    </div>

    <script>
        // ── Global state ──
        let _savedRaces = [];
        let batchPairCounter = 0;
        let _batchResults = [];
        let _pinnacleRaces = null;
        let _pinnacleMatchupIds = null;

        // Autocomplete setup (used by batch pair rows)
        function setupAutocomplete(inputId, listId, hiddenId, endpoint, onSelect) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);
            const hidden = document.getElementById(hiddenId);
            let debounce;

            input.addEventListener('input', () => {
                clearTimeout(debounce);
                debounce = setTimeout(async () => {
                    const q = input.value.trim();
                    if (q.length < 2) { list.classList.remove('active'); return; }
                    const res = await fetch(`${endpoint}?q=${encodeURIComponent(q)}`);
                    const items = await res.json();
                    list.innerHTML = '';
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        const label = item.name || item.label;
                        const sub = item.distance ? `${item.distance}km` : (item.nationality || '');
                        div.innerHTML = `${label}${sub ? `<small>${sub}</small>` : ''}`;
                        div.onclick = () => {
                            input.value = label;
                            hidden.value = item.url;
                            list.classList.remove('active');
                            if (onSelect) onSelect(item);
                        };
                        list.appendChild(div);
                    });
                    list.classList.toggle('active', items.length > 0);
                }, 250);
            });

            document.addEventListener('click', e => {
                if (!e.target.closest('.autocomplete-wrap')) list.classList.remove('active');
            });
        }

        // Load stats
        fetch('/api/stats').then(r => r.json()).then(s => {
            const statsText = `Database: ${s.races} races · ${s.stages} stages · ${s.results.toLocaleString()} results · ${s.riders} riders · Years: ${s.year_range}`;
            document.getElementById('stats-bar-batch').textContent = statsText;
        }).catch(() => {});

        // Batch mode is always active — load saved races and bankroll on init
        loadBatchSavedRaces();
        fetchBankrollForBooking();

        function addPinnaclePair(pair) {
            const container = document.getElementById('batch-pairs-container');
            const idx = batchPairCounter++;
            const row = document.createElement('div');
            row.className = 'batch-pair-row';
            row.id = `batch-pair-${idx}`;

            // Per RESEARCH.md Pattern 4: store matchup_id on the DOM element, not in a parallel array
            row.setAttribute('data-matchup-id', pair.matchup_id);

            row.innerHTML = `
                <div class="form-group">
                    <div class="autocomplete-wrap">
                        <input type="text" id="bp-a-input-${idx}" placeholder="Search rider A..." autocomplete="off">
                        <div class="autocomplete-list" id="bp-a-list-${idx}"></div>
                        <input type="hidden" id="bp-a-url-${idx}">
                    </div>
                </div>
                <div class="form-group">
                    <div class="autocomplete-wrap">
                        <input type="text" id="bp-b-input-${idx}" placeholder="Search rider B..." autocomplete="off">
                        <div class="autocomplete-list" id="bp-b-list-${idx}"></div>
                        <input type="hidden" id="bp-b-url-${idx}">
                    </div>
                </div>
                <div class="form-group">
                    <input type="number" id="bp-odds-a-${idx}" placeholder="e.g. 1.73" step="0.01" min="1.01">
                </div>
                <div class="form-group">
                    <input type="number" id="bp-odds-b-${idx}" placeholder="e.g. 2.00" step="0.01" min="1.01">
                </div>
                <button class="remove-pair-btn" onclick="removeBatchPair(${idx})" title="Remove pair">X</button>
            `;
            container.appendChild(row);

            // Rider A
            const aInput = document.getElementById('bp-a-input-' + idx);
            const aUrl = document.getElementById('bp-a-url-' + idx);
            const aWrap = aInput.closest('.autocomplete-wrap');
            if (pair.rider_a_resolved) {
                aInput.value = pair.pinnacle_name_a;
                aUrl.value = pair.rider_a_url;
            } else {
                // Per D-14: pre-fill with best_candidate hint if available
                if (pair.best_candidate_a_name) {
                    aInput.value = pair.best_candidate_a_name;
                    aUrl.value = pair.best_candidate_a_url || '';
                }
                // Per D-15: orange border for unresolved
                if (aWrap) aWrap.parentElement.classList.add('unresolved-rider');
            }

            // Per D-15: pass onSelect callback to clear orange border when user selects a valid rider
            const aOnSelect = pair.rider_a_resolved ? undefined :
                () => { if (aWrap) aWrap.parentElement.classList.remove('unresolved-rider'); };
            setupAutocomplete('bp-a-input-' + idx, 'bp-a-list-' + idx, 'bp-a-url-' + idx, '/api/riders', aOnSelect);

            // Rider B
            const bInput = document.getElementById('bp-b-input-' + idx);
            const bUrl = document.getElementById('bp-b-url-' + idx);
            const bWrap = bInput.closest('.autocomplete-wrap');
            if (pair.rider_b_resolved) {
                bInput.value = pair.pinnacle_name_b;
                bUrl.value = pair.rider_b_url;
            } else {
                if (pair.best_candidate_b_name) {
                    bInput.value = pair.best_candidate_b_name;
                    bUrl.value = pair.best_candidate_b_url || '';
                }
                if (bWrap) bWrap.parentElement.classList.add('unresolved-rider');
            }

            const bOnSelect = pair.rider_b_resolved ? undefined :
                () => { if (bWrap) bWrap.parentElement.classList.remove('unresolved-rider'); };
            setupAutocomplete('bp-b-input-' + idx, 'bp-b-list-' + idx, 'bp-b-url-' + idx, '/api/riders', bOnSelect);

            // Odds -- safe order per RESEARCH.md Pitfall 2: (1) set .value, (2) set data-source, (3) attach oninput
            const oddsA = document.getElementById('bp-odds-a-' + idx);
            const oddsB = document.getElementById('bp-odds-b-' + idx);
            oddsA.value = pair.odds_a;
            oddsB.value = pair.odds_b;
            oddsA.setAttribute('data-source', 'auto');    // Per D-11
            oddsB.setAttribute('data-source', 'auto');    // Per D-11
            oddsA.addEventListener('input', function() { this.setAttribute('data-source', 'user'); }); // Per D-12
            oddsB.addEventListener('input', function() { this.setAttribute('data-source', 'user'); }); // Per D-12
        }

        async function loadFromPinnacle() {
            const btn = document.getElementById('load-pinnacle-btn');
            const err = document.getElementById('batch-error');
            const pickerWrap = document.getElementById('pinnacle-race-picker');
            const sel = document.getElementById('pinnacle-race-select');
            err.style.display = 'none';

            // Reset state per D-10
            _pinnacleRaces = null;
            _pinnacleMatchupIds = null;

            // Fetch bankroll for booking
            await fetchBankrollForBooking();

            // Loading state per D-07
            btn.disabled = true;
            btn.textContent = '\u23F3 Loading from Pinnacle...';
            pickerWrap.style.display = 'none';

            try {
                const res = await fetch('/api/pinnacle/load', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                const data = await res.json();

                // Error handling per D-17, D-18
                if (!res.ok) {
                    if (data.type === 'auth_error') {
                        const envVar = data.env_var || 'PINNACLE_SESSION_COOKIE';
                        err.innerHTML = 'Session expired. To fix:<br>' +
                            '1. Open DevTools on pinnacle.ca \u2192 Network tab \u2192 any request<br>' +
                            '2. Copy the X-Session header value<br>' +
                            '3. Set ' + envVar + '=&lt;value&gt; in your environment<br>' +
                            '4. Restart Flask (python webapp/app.py)';
                    } else {
                        err.textContent = 'Load failed: ' + (data.error || 'Unknown error');
                    }
                    err.style.display = 'block';
                    return;
                }

                if (!data.races || data.races.length === 0) {
                    err.textContent = 'No cycling markets found for today. Check that your Pinnacle session is active and markets are open.';
                    err.style.display = 'block';
                    return;
                }

                // Store races
                _pinnacleRaces = data.races;

                // Populate race picker per D-04
                sel.innerHTML = '<option value="">\u2014 Select a Race \u2014</option>';
                data.races.forEach((race, i) => {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = race.race_name + ' (' + race.pairs.length + ' matchups)';
                    sel.appendChild(opt);
                });
                pickerWrap.style.display = '';

                // Per D-04: if single race, auto-select immediately
                if (data.races.length === 1) {
                    sel.value = '0';
                    populatePinnacleRace(0);
                }
            } catch (e) {
                err.textContent = 'Load failed: ' + e.message;
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Load from Pinnacle';
            }
        }

        function onPinnacleRaceChange() {
            const sel = document.getElementById('pinnacle-race-select');
            const idx = parseInt(sel.value);
            if (isNaN(idx) || !_pinnacleRaces || !_pinnacleRaces[idx]) return;
            populatePinnacleRace(idx);
        }

        function populatePinnacleRace(idx) {
            const race = _pinnacleRaces[idx];
            if (!race) return;

            // Per D-09: always replace stage fields
            const sc = race.stage_context || {};
            document.getElementById('batch-race-name').value = race.race_name || '';
            document.getElementById('batch-race-date').value = sc.race_date || '';
            document.getElementById('batch-distance').value = sc.distance || '';
            document.getElementById('batch-vert').value = sc.vertical_meters || '';
            document.getElementById('batch-profile').value = sc.profile_icon || 'p3';
            document.getElementById('batch-stage-type').value = sc.stage_type || 'RR';
            document.getElementById('batch-oneday').value = sc.is_one_day_race ? '1' : '0';
            document.getElementById('batch-climbs').value = sc.num_climbs || '';
            document.getElementById('batch-uci-tour').value = sc.uci_tour || '';
            document.getElementById('batch-race-url').value = sc.race_base_url || '';

            // Per D-08: clear existing pairs, replace with Pinnacle pairs
            clearBatchPairs();

            // Build _pinnacleMatchupIds as a Set of matchup_id strings (for early-exit guard in refreshOdds)
            _pinnacleMatchupIds = new Set();

            race.pairs.forEach(pair => {
                addPinnaclePair(pair);
                _pinnacleMatchupIds.add(pair.matchup_id);
            });

            updateBatchPairCount();
        }

        function loadBatchSavedRaces() {
            const sel = document.getElementById('batch-saved-race-select');
            sel.innerHTML = '<option value="">— Select Saved Race or Enter Below —</option>';
            _savedRaces.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.id;
                const profile = r.profile_icon ? ` (${r.profile_icon})` : '';
                const dist = r.distance_km ? ` ${r.distance_km}km` : '';
                opt.textContent = `${r.name}${dist}${profile}`;
                sel.appendChild(opt);
            });
        }

        document.getElementById('batch-saved-race-select').addEventListener('change', function() {
            const id = parseInt(this.value);
            if (!id) return;
            const race = _savedRaces.find(r => r.id === id);
            if (!race) return;
            document.getElementById('batch-race-name').value = race.name || '';
            document.getElementById('batch-distance').value = race.distance_km || '';
            document.getElementById('batch-vert').value = race.vertical_meters || '';
            document.getElementById('batch-profile').value = race.profile_icon || 'p3';
            document.getElementById('batch-stage-type').value = race.stage_type || 'RR';
            document.getElementById('batch-oneday').value = race.is_one_day_race ? '1' : '0';
            document.getElementById('batch-climbs').value = race.num_climbs || '';
            document.getElementById('batch-race-url').value = race.race_base_url || '';
            document.getElementById('batch-race-date').value = race.race_date || new Date().toISOString().split('T')[0];
        });

        document.getElementById('batch-race-date').value = new Date().toISOString().split('T')[0];

        function addBatchPair() {
            const container = document.getElementById('batch-pairs-container');
            const idx = batchPairCounter++;
            const row = document.createElement('div');
            row.className = 'batch-pair-row';
            row.id = `batch-pair-${idx}`;
            row.innerHTML = `
                <div class="form-group">
                    <div class="autocomplete-wrap">
                        <input type="text" id="bp-a-input-${idx}" placeholder="Search rider A..." autocomplete="off">
                        <div class="autocomplete-list" id="bp-a-list-${idx}"></div>
                        <input type="hidden" id="bp-a-url-${idx}">
                    </div>
                </div>
                <div class="form-group">
                    <div class="autocomplete-wrap">
                        <input type="text" id="bp-b-input-${idx}" placeholder="Search rider B..." autocomplete="off">
                        <div class="autocomplete-list" id="bp-b-list-${idx}"></div>
                        <input type="hidden" id="bp-b-url-${idx}">
                    </div>
                </div>
                <div class="form-group">
                    <input type="number" id="bp-odds-a-${idx}" placeholder="e.g. 1.73" step="0.01" min="1.01">
                </div>
                <div class="form-group">
                    <input type="number" id="bp-odds-b-${idx}" placeholder="e.g. 2.00" step="0.01" min="1.01">
                </div>
                <button class="remove-pair-btn" onclick="removeBatchPair(${idx})" title="Remove pair">✕</button>
            `;
            container.appendChild(row);
            setupAutocomplete(`bp-a-input-${idx}`, `bp-a-list-${idx}`, `bp-a-url-${idx}`, '/api/riders');
            setupAutocomplete(`bp-b-input-${idx}`, `bp-b-list-${idx}`, `bp-b-url-${idx}`, '/api/riders');
            updateBatchPairCount();
        }

        function addMultipleBatchPairs() {
            for (let i = 0; i < 5; i++) addBatchPair();
        }

        function removeBatchPair(idx) {
            const row = document.getElementById(`batch-pair-${idx}`);
            if (row) row.remove();
            updateBatchPairCount();
        }

        function clearBatchPairs() {
            document.getElementById('batch-pairs-container').innerHTML = '';
            batchPairCounter = 0;
            updateBatchPairCount();
        }

        function updateBatchPairCount() {
            const count = document.querySelectorAll('#batch-pairs-container .batch-pair-row').length;
            document.getElementById('batch-pair-count').textContent = `${count} pair${count !== 1 ? 's' : ''}`;
        }

        function getBatchPairs() {
            const rows = document.querySelectorAll('#batch-pairs-container .batch-pair-row');
            const pairs = [];
            rows.forEach(row => {
                const idx = row.id.replace('batch-pair-', '');
                const aUrl = document.getElementById(`bp-a-url-${idx}`).value;
                const bUrl = document.getElementById(`bp-b-url-${idx}`).value;
                const aName = document.getElementById(`bp-a-input-${idx}`).value;
                const bName = document.getElementById(`bp-b-input-${idx}`).value;
                const oddsA = document.getElementById(`bp-odds-a-${idx}`).value;
                const oddsB = document.getElementById(`bp-odds-b-${idx}`).value;
                if (aUrl && bUrl) {
                    pairs.push({
                        rider_a_url: aUrl, rider_b_url: bUrl,
                        rider_a_name: aName, rider_b_name: bName,
                        odds_a: oddsA ? parseFloat(oddsA) : null,
                        odds_b: oddsB ? parseFloat(oddsB) : null,
                    });
                }
            });
            return pairs;
        }

        function getBatchRaceParams() {
            const distance = parseFloat(document.getElementById('batch-distance').value);
            if (!distance || distance <= 0) return null;
            return {
                distance: distance,
                vertical_meters: parseFloat(document.getElementById('batch-vert').value) || 0,
                profile_icon: document.getElementById('batch-profile').value,
                stage_type: document.getElementById('batch-stage-type').value,
                is_one_day_race: document.getElementById('batch-oneday').value === '1',
                race_date: document.getElementById('batch-race-date').value || new Date().toISOString().split('T')[0],
                race_base_url: document.getElementById('batch-race-url').value || null,
                num_climbs: parseInt(document.getElementById('batch-climbs').value) || 0,
                uci_tour: document.getElementById('batch-uci-tour').value || '',
            };
        }

        async function batchPredict() {
            const btn = document.getElementById('batch-predict-btn');
            const err = document.getElementById('batch-error');
            const resultsDiv = document.getElementById('batch-results');
            err.style.display = 'none';
            resultsDiv.style.display = 'none';

            // Fetch bankroll for recommended stake calculations
            await fetchBankrollForBooking();

            const pairs = getBatchPairs();
            if (pairs.length === 0) {
                err.textContent = 'Add at least one H2H pair with both riders selected.';
                err.style.display = 'block';
                return;
            }

            const raceParams = getBatchRaceParams();
            if (!raceParams) {
                err.textContent = 'Enter a valid race distance.';
                err.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = `⏳ Predicting ${pairs.length} matchups...`;

            try {
                const res = await fetch('/api/predict/batch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pairs, race_params: raceParams }),
                });
                const data = await res.json();
                if (data.error) {
                    err.textContent = data.error;
                    err.style.display = 'block';
                    return;
                }

                _batchResults = data.results;
                renderBatchResults(data.results, pairs);
                resultsDiv.style.display = 'block';
                resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch(e) {
                err.textContent = 'Batch prediction failed: ' + e.message;
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '⚡ Predict All H2H';
            }
        }

        // Store enriched pair data for booking (Pinnacle load or batch predict)
        let _enrichedPairs = [];
        let _currentBankroll = 0;

        function renderBatchResults(results, pairs) {
            const tbody = document.getElementById('batch-results-body');
            const summary = document.getElementById('batch-summary');
            const logBtn = document.getElementById('submit-all-bets-btn');
            tbody.innerHTML = '';
            _enrichedPairs = [];

            let valueBets = 0;
            let totalEdge = 0;
            let successCount = 0;

            results.forEach((r, i) => {
                if (r.error) {
                    tbody.innerHTML += `<tr><td>${i+1}</td><td colspan="12" style="color:var(--red);">Error: ${r.error}</td></tr>`;
                    return;
                }
                successCount++;

                const probA = r.rider_a.win_probability;
                const probB = r.rider_b.win_probability;
                const winner = probA >= probB ? r.rider_a : r.rider_b;

                // Find the value bet side
                const kellyA = r.rider_a.kelly;
                const kellyB = r.rider_b.kelly;
                let valueSide = null;
                let edge = '—';
                let edgeClass = '';
                let halfKelly = '—';
                let oddsStr = '—';
                let shouldBet = false;
                let recStake = 0;
                let selectedOdds = 0;
                let selectedEdge = 0;
                let selectedProb = 0;

                if (kellyA && kellyA.should_bet) {
                    valueSide = 'A';
                    edge = kellyA.edge_pct;
                    edgeClass = 'edge-positive';
                    halfKelly = (kellyA.quarter_kelly * 100).toFixed(1) + '%';
                    oddsStr = kellyA.bookmaker_odds.toFixed(2);
                    totalEdge += kellyA.edge;
                    valueBets++;
                    shouldBet = true;
                    recStake = _currentBankroll > 0 ? (kellyA.quarter_kelly * _currentBankroll) : 0;
                    selectedOdds = kellyA.bookmaker_odds;
                    selectedEdge = kellyA.edge;
                    selectedProb = probA;
                } else if (kellyB && kellyB.should_bet) {
                    valueSide = 'B';
                    edge = kellyB.edge_pct;
                    edgeClass = 'edge-positive';
                    halfKelly = (kellyB.quarter_kelly * 100).toFixed(1) + '%';
                    oddsStr = kellyB.bookmaker_odds.toFixed(2);
                    totalEdge += kellyB.edge;
                    valueBets++;
                    shouldBet = true;
                    recStake = _currentBankroll > 0 ? (kellyB.quarter_kelly * _currentBankroll) : 0;
                    selectedOdds = kellyB.bookmaker_odds;
                    selectedEdge = kellyB.edge;
                    selectedProb = 1.0 - probA;
                } else {
                    if (kellyA) {
                        edge = kellyA.edge_pct;
                        edgeClass = kellyA.edge > 0 ? 'edge-positive' : 'edge-negative';
                        oddsStr = kellyA.bookmaker_odds.toFixed(2);
                    }
                    if (kellyB && (!kellyA || kellyB.edge > kellyA.edge)) {
                        edge = kellyB.edge_pct;
                        edgeClass = kellyB.edge > 0 ? 'edge-positive' : 'edge-negative';
                        oddsStr = kellyB.bookmaker_odds.toFixed(2);
                    }
                }

                const valueLabel = valueSide
                    ? `<span class="value-yes">✅ ${valueSide === 'A' ? r.rider_a.name : r.rider_b.name}</span>`
                    : `<span class="value-no">❌</span>`;

                // Booking columns — all rows are bookable, stakes start at 0
                const stakeCell = `<td><input type="number" class="stake-input" value="0" step="0.01" min="0" data-row-idx="${i}"></td>`;

                // Store enriched pair data for booking
                _enrichedPairs.push({
                    rider_a_name: r.rider_a.name,
                    rider_b_name: r.rider_b.name,
                    rider_a_url: r.rider_a.url || (pairs[i] ? pairs[i].rider_a_url : ''),
                    rider_b_url: r.rider_b.url || (pairs[i] ? pairs[i].rider_b_url : ''),
                    odds_a: pairs[i] ? pairs[i].odds_a : (kellyA ? kellyA.bookmaker_odds : 0),
                    odds_b: pairs[i] ? pairs[i].odds_b : (kellyB ? kellyB.bookmaker_odds : 0),
                    selection: valueSide,
                    selectedOdds: selectedOdds,
                    selectedEdge: selectedEdge,
                    selectedProb: selectedProb,
                    recommended_stake: recStake,
                    should_bet: shouldBet,
                    pinnacle_name_a: r.rider_a.name,
                    pinnacle_name_b: r.rider_b.name,
                });

                tbody.innerHTML += `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${r.rider_a.name}</td>
                        <td>${r.rider_b.name}</td>
                        <td>${r.rider_a.win_pct}</td>
                        <td>${r.rider_b.win_pct}</td>
                        <td class="winner-cell">${winner.name}</td>
                        <td>${oddsStr}</td>
                        <td class="${edgeClass}">${edge}</td>
                        <td>${halfKelly}</td>
                        <td>${valueLabel}</td>
                        ${stakeCell}
                    </tr>
                `;
            });

            summary.innerHTML = `
                <div><span class="stat-value">${successCount}</span><span class="stat-label">Matchups</span></div>
                <div><span class="stat-value" style="color:var(--green)">${valueBets}</span><span class="stat-label">Value Bets</span></div>
                <div><span class="stat-value">${successCount - valueBets}</span><span class="stat-label">No Edge</span></div>
                <div><span class="stat-value" style="color:var(--green)">${valueBets > 0 ? (totalEdge / valueBets * 100).toFixed(1) + '%' : '—'}</span><span class="stat-label">Avg Edge</span></div>
            `;

            logBtn.style.display = '';
        }

        // ── Bankroll check for bet booking ──
        async function fetchBankrollForBooking() {
            try {
                const res = await fetch('/api/pnl/total-bankroll');
                const data = await res.json();
                _currentBankroll = data.bankroll || 0;
            } catch(e) {
                _currentBankroll = 0;
            }
        }

        async function submitAllBets() {
            const btn = document.getElementById('submit-all-bets-btn');
            const raceName = document.getElementById('batch-race-name').value || 'Unknown Race';
            const raceDate = document.getElementById('batch-race-date').value || new Date().toISOString().split('T')[0];

            // Build stage context
            const stageCtx = {
                stage_url: '',
                race_date: raceDate,
                is_one_day_race: document.getElementById('batch-oneday').value === '1',
                stage_type: document.getElementById('batch-stage-type').value || 'RR',
                profile_icon: document.getElementById('batch-profile').value || '',
                distance_km: parseFloat(document.getElementById('batch-distance').value) || 0,
                vertical_meters: parseFloat(document.getElementById('batch-vert').value) || 0,
                num_climbs: parseInt(document.getElementById('batch-climbs').value) || 0,
            };
            if (_pinnacleRaces) {
                const selIdx = parseInt(document.getElementById('pinnacle-race-select').value);
                if (!isNaN(selIdx) && _pinnacleRaces[selIdx] && _pinnacleRaces[selIdx].stage_context) {
                    const sc = _pinnacleRaces[selIdx].stage_context;
                    stageCtx.stage_url = sc.stage_url || '';
                    stageCtx.race_date = sc.race_date || raceDate;
                    stageCtx.is_one_day_race = sc.is_one_day_race || false;
                    stageCtx.stage_type = sc.stage_type || 'RR';
                    stageCtx.profile_icon = sc.profile_icon || '';
                    stageCtx.distance_km = sc.distance_km || sc.distance || 0;
                    stageCtx.vertical_meters = sc.vertical_meters || 0;
                    stageCtx.num_climbs = sc.num_climbs || 0;
                }
            }

            // Collect all rows with stake > 0
            const betsToPlace = [];
            document.querySelectorAll('.stake-input').forEach(input => {
                const stake = parseFloat(input.value);
                if (isNaN(stake) || stake <= 0) return;
                const idx = parseInt(input.dataset.rowIdx);
                const pair = _enrichedPairs[idx];
                if (!pair) return;

                let selection = pair.selection;
                let selectedOdds = pair.selectedOdds;

                // For rows without a value side, default to the side with better edge
                if (!selection) {
                    if (pair.odds_a && pair.odds_b) {
                        // Pick whichever side has better prob
                        selection = (pair.selectedProb || 0.5) >= 0.5 ? 'A' : 'B';
                    } else {
                        selection = 'A';
                    }
                    selectedOdds = selection === 'A' ? pair.odds_a : pair.odds_b;
                }

                const selectionName = selection === 'A' ? pair.pinnacle_name_a : pair.pinnacle_name_b;
                betsToPlace.push({ pair, selection, selectedOdds, selectionName, stake });
            });

            if (betsToPlace.length === 0) {
                alert('Enter stake amounts on the rows you want to bet, then submit.');
                return;
            }

            const totalStake = betsToPlace.reduce((sum, b) => sum + b.stake, 0);
            const lines = betsToPlace.map(b => `  ${b.selectionName} @ ${b.selectedOdds.toFixed(2)} - $${b.stake.toFixed(2)}`).join('\n');
            if (!confirm(`Submit ${betsToPlace.length} bet${betsToPlace.length !== 1 ? 's' : ''}?\n\n${lines}\n\nTotal stake: $${totalStake.toFixed(2)} CAD`)) return;

            btn.disabled = true;
            btn.textContent = 'Submitting...';
            let logged = 0;
            let lastBankroll = 0;

            for (const bet of betsToPlace) {
                const res = await fetch('/api/pnl/bet', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        stage_url: stageCtx.stage_url,
                        race_name: raceName,
                        race_date: stageCtx.race_date,
                        rider_a_url: bet.pair.rider_a_url,
                        rider_a_name: bet.pair.rider_a_name,
                        rider_b_url: bet.pair.rider_b_url,
                        rider_b_name: bet.pair.rider_b_name,
                        selection: bet.selection,
                        decimal_odds: bet.selectedOdds,
                        model_prob: bet.pair.selectedProb || 0.5,
                        kelly_fraction: bet.pair.selectedEdge ? bet.pair.selectedEdge / (bet.selectedOdds - 1) : 0,
                        stake: bet.stake,
                        recommended_stake: bet.pair.recommended_stake,
                        model_used: 'CalibratedXGBoost',
                        is_one_day_race: stageCtx.is_one_day_race ? 1 : 0,
                        stage_type: stageCtx.stage_type,
                        profile_icon: stageCtx.profile_icon,
                        distance_km: stageCtx.distance_km,
                        vertical_meters: stageCtx.vertical_meters,
                        num_climbs: stageCtx.num_climbs,
                    }),
                });
                const data = await res.json();
                if (!data.error) {
                    lastBankroll = data.bankroll;
                    logged++;
                }
            }

            btn.disabled = false;
            btn.textContent = `${logged} bet${logged !== 1 ? 's' : ''} submitted! Bankroll: $${lastBankroll.toFixed(2)} CAD`;
            setTimeout(() => { btn.textContent = 'Submit All Bets'; }, 4000);
        }

        // Add initial pair rows
        addBatchPair();
    </script>
