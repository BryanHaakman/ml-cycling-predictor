<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycling H2H Predictor</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --accent: #f5c518;
            --green: #00c853;
            --red: #ff5252;
            --blue: #448aff;
            --text: #e8e8e8;
            --muted: #8a8d9b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
        header h1 span { color: var(--accent); }
        header p { color: var(--muted); font-size: 0.9rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            padding: 0.7rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        input::placeholder { color: var(--muted); }

        .autocomplete-wrap { position: relative; }
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto;
            z-index: 10; display: none;
        }
        .autocomplete-list.active { display: block; }
        .autocomplete-item {
            padding: 0.6rem 1rem; cursor: pointer;
            font-size: 0.9rem; border-bottom: 1px solid var(--border);
        }
        .autocomplete-item:hover { background: #252836; }
        .autocomplete-item small { color: var(--muted); margin-left: 0.5rem; }

        .odds-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .odds-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 1rem;
        }
        .odds-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }

        .btn {
            width: 100%; padding: 0.9rem;
            background: var(--accent); color: #000;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
            margin-bottom: 1.5rem;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Results */
        #results { display: none; }
        .results-header {
            text-align: center; margin-bottom: 1.5rem;
            font-size: 0.8rem; color: var(--muted); text-transform: uppercase;
        }
        .matchup {
            display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem;
            align-items: start; margin-bottom: 2rem;
        }
        .rider-card {
            background: var(--card); border-radius: 12px;
            padding: 1.5rem; text-align: center;
            border: 2px solid var(--border); transition: border-color 0.3s;
        }
        .rider-card.winner { border-color: var(--green); }
        .rider-card .name { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .rider-card .prob {
            font-size: 2.2rem; font-weight: 800; margin: 0.5rem 0;
        }
        .rider-card.winner .prob { color: var(--green); }
        .rider-card .prob-label { font-size: 0.75rem; color: var(--muted); }

        .vs {
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 700; color: var(--muted);
            padding-top: 2rem;
        }

        /* Kelly section */
        .kelly-section {
            background: var(--card); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1rem;
            border: 1px solid var(--border);
        }
        .kelly-section h3 {
            font-size: 0.85rem; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        .kelly-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .kelly-stat { text-align: center; }
        .kelly-stat .value {
            font-size: 1.4rem; font-weight: 700; display: block;
        }
        .kelly-stat .label {
            font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
        }
        .kelly-stat .value.positive { color: var(--green); }
        .kelly-stat .value.negative { color: var(--red); }
        .kelly-stat .value.neutral { color: var(--muted); }

        .kelly-verdict {
            margin-top: 1rem; padding: 0.8rem;
            border-radius: 8px; font-size: 0.9rem; text-align: center;
        }
        .kelly-verdict.bet { background: rgba(0, 200, 83, 0.1); border: 1px solid var(--green); color: var(--green); }
        .kelly-verdict.no-bet { background: rgba(255, 82, 82, 0.1); border: 1px solid var(--red); color: var(--red); }

        .stats-bar {
            text-align: center; padding: 1rem; color: var(--muted);
            font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 2rem;
        }
        .error-msg { color: var(--red); text-align: center; padding: 1rem; }
        .mode-btn {
            padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 0.8rem; transition: all 0.2s;
        }
        .mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        .mode-btn:hover:not(.active) { border-color: var(--muted); }
        @media (max-width: 600px) {
            .form-grid, .odds-section, .matchup { grid-template-columns: 1fr; }
            .vs { padding: 0.5rem 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚴 Cycling <span>H2H</span> Predictor</h1>
            <p>ML-powered head-to-head predictions with Kelly Criterion staking</p>
            <nav style="margin-top:0.5rem;"><a href="/" style="color:var(--accent);text-decoration:none;margin-right:1rem;">Predictions</a><a href="/results" style="color:var(--muted);text-decoration:none;margin-right:1rem;">Results</a><a href="/pnl" style="color:var(--muted);text-decoration:none;">P&L Tracker</a></nav>
        </header>

        <div class="form-grid">
            <div class="form-group">
                <label>Rider A</label>
                <div class="autocomplete-wrap">
                    <input type="text" id="rider-a-input" placeholder="Search rider..." autocomplete="off">
                    <div class="autocomplete-list" id="rider-a-list"></div>
                    <input type="hidden" id="rider-a-url">
                </div>
            </div>
            <div class="form-group">
                <label>Rider B</label>
                <div class="autocomplete-wrap">
                    <input type="text" id="rider-b-input" placeholder="Search rider..." autocomplete="off">
                    <div class="autocomplete-list" id="rider-b-list"></div>
                    <input type="hidden" id="rider-b-url">
                </div>
            </div>
            <div class="form-group full">
                <label>Race Setup</label>
                <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;align-items:center;flex-wrap:wrap;">
                    <select id="saved-race-select" style="flex:1;min-width:200px;padding:0.5rem 0.8rem;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem;">
                        <option value="">— New Race —</option>
                    </select>
                    <button type="button" class="mode-btn" id="btn-save-race" onclick="saveCurrentRace()" title="Save race config">💾 Save</button>
                    <button type="button" class="mode-btn" id="btn-delete-race" onclick="deleteSelectedRace()" title="Delete saved race" style="display:none;">🗑️</button>
                    <button type="button" class="mode-btn" id="mode-db" onclick="setRaceMode('db')">From Database</button>
                </div>
                <div id="race-manual-section">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">
                        <div class="form-group">
                            <label>Race Name</label>
                            <input type="text" id="manual-race-name" placeholder="e.g. Tour de France Stage 1">
                        </div>
                        <div class="form-group">
                            <label>Race Date</label>
                            <input type="date" id="manual-race-date">
                        </div>
                        <div class="form-group">
                            <label>Distance (km)</label>
                            <input type="number" id="manual-distance" placeholder="e.g. 200" step="0.1" min="0">
                        </div>
                        <div class="form-group">
                            <label>Vertical Metres</label>
                            <input type="number" id="manual-vert" placeholder="e.g. 3500" step="1" min="0">
                        </div>
                        <div class="form-group">
                            <label>Profile Type</label>
                            <select id="manual-profile">
                                <option value="p1">p1 — Flat</option>
                                <option value="p2">p2 — Hilly (flat finish)</option>
                                <option value="p3" selected>p3 — Hilly (uphill finish)</option>
                                <option value="p4">p4 — Mountain</option>
                                <option value="p5">p5 — Mountain (summit finish)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Stage Type</label>
                            <select id="manual-stage-type">
                                <option value="RR" selected>Road Race</option>
                                <option value="ITT">Individual Time Trial</option>
                                <option value="TTT">Team Time Trial</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>One-Day Race?</label>
                            <select id="manual-oneday">
                                <option value="0">No (stage race)</option>
                                <option value="1">Yes (one-day race)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Number of Climbs</label>
                            <input type="number" id="manual-climbs" placeholder="e.g. 5" step="1" min="0">
                        </div>
                        <div class="form-group full">
                            <label>Race Base URL (optional — for same-race history)</label>
                            <input type="text" id="manual-race-url" placeholder="e.g. race/tour-de-france">
                        </div>
                    </div>
                </div>
                <div id="race-db-section" style="display:none;">
                    <div class="autocomplete-wrap">
                        <input type="text" id="race-input" placeholder="Search race from database..." autocomplete="off">
                        <div class="autocomplete-list" id="race-list"></div>
                        <input type="hidden" id="stage-url">
                    </div>
                </div>
            </div>
        </div>

        <div class="odds-section">
            <div class="odds-card">
                <h3>Bookmaker Odds — Rider A</h3>
                <input type="number" id="odds-a" placeholder="Decimal odds e.g. 2.50" step="0.01" min="1.01">
            </div>
            <div class="odds-card">
                <h3>Bookmaker Odds — Rider B</h3>
                <input type="number" id="odds-b" placeholder="Decimal odds e.g. 1.65" step="0.01" min="1.01">
            </div>
        </div>

        <button class="btn" id="predict-btn" onclick="predict()">Predict Head-to-Head</button>

        <div id="error" class="error-msg" style="display:none;"></div>

        <div id="results">
            <div class="results-header">Prediction Result</div>
            <div class="matchup">
                <div class="rider-card" id="card-a">
                    <div class="name" id="name-a">—</div>
                    <div class="prob-label">Win Probability</div>
                    <div class="prob" id="prob-a">—</div>
                </div>
                <div class="vs">VS</div>
                <div class="rider-card" id="card-b">
                    <div class="name" id="name-b">—</div>
                    <div class="prob-label">Win Probability</div>
                    <div class="prob" id="prob-b">—</div>
                </div>
            </div>
            <div id="kelly-results"></div>
        </div>

        <div class="stats-bar" id="stats-bar">Loading stats...</div>
    </div>

    <script>
        let raceMode = 'manual'; // 'manual' or 'db'

        function setRaceMode(mode) {
            raceMode = mode;
            document.getElementById('mode-db').classList.toggle('active', mode === 'db');
            document.getElementById('race-db-section').style.display = mode === 'db' ? '' : 'none';
            document.getElementById('race-manual-section').style.display = mode === 'manual' ? '' : 'none';
            if (mode === 'db') {
                document.getElementById('mode-db').textContent = '✓ From Database';
            } else {
                document.getElementById('mode-db').textContent = 'From Database';
            }
        }

        // ── Saved Races ──
        let _savedRaces = [];

        async function loadSavedRaces() {
            try {
                _savedRaces = await fetch('/api/saved-races').then(r => r.json());
                const sel = document.getElementById('saved-race-select');
                sel.innerHTML = '<option value="">— New Race —</option>';
                _savedRaces.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.id;
                    const profile = r.profile_icon ? ` (${r.profile_icon})` : '';
                    const dist = r.distance_km ? ` ${r.distance_km}km` : '';
                    opt.textContent = `${r.name}${dist}${profile}`;
                    sel.appendChild(opt);
                });
            } catch(e) {}
        }

        document.getElementById('saved-race-select').addEventListener('change', function() {
            const id = parseInt(this.value);
            const delBtn = document.getElementById('btn-delete-race');
            if (!id) {
                delBtn.style.display = 'none';
                clearRaceForm();
                return;
            }
            delBtn.style.display = '';
            const race = _savedRaces.find(r => r.id === id);
            if (!race) return;
            setRaceMode('manual');
            document.getElementById('manual-race-name').value = race.name || '';
            document.getElementById('manual-distance').value = race.distance_km || '';
            document.getElementById('manual-vert').value = race.vertical_meters || '';
            document.getElementById('manual-profile').value = race.profile_icon || 'p3';
            document.getElementById('manual-stage-type').value = race.stage_type || 'RR';
            document.getElementById('manual-oneday').value = race.is_one_day_race ? '1' : '0';
            document.getElementById('manual-climbs').value = race.num_climbs || '';
            document.getElementById('manual-race-url').value = race.race_base_url || '';
            document.getElementById('manual-race-date').value = race.race_date || new Date().toISOString().split('T')[0];
        });

        function clearRaceForm() {
            document.getElementById('manual-race-name').value = '';
            document.getElementById('manual-distance').value = '';
            document.getElementById('manual-vert').value = '';
            document.getElementById('manual-profile').value = 'p3';
            document.getElementById('manual-stage-type').value = 'RR';
            document.getElementById('manual-oneday').value = '0';
            document.getElementById('manual-climbs').value = '';
            document.getElementById('manual-race-url').value = '';
            document.getElementById('manual-race-date').value = new Date().toISOString().split('T')[0];
        }

        async function saveCurrentRace() {
            const name = document.getElementById('manual-race-name').value.trim();
            if (!name) {
                alert('Enter a race name first');
                return;
            }
            const data = {
                name: name,
                distance_km: parseFloat(document.getElementById('manual-distance').value) || null,
                vertical_meters: parseFloat(document.getElementById('manual-vert').value) || null,
                profile_icon: document.getElementById('manual-profile').value,
                stage_type: document.getElementById('manual-stage-type').value,
                is_one_day_race: document.getElementById('manual-oneday').value === '1',
                num_climbs: parseInt(document.getElementById('manual-climbs').value) || 0,
                race_base_url: document.getElementById('manual-race-url').value || null,
                race_date: document.getElementById('manual-race-date').value || null,
            };
            const res = await fetch('/api/saved-races', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            const result = await res.json();
            if (result.error) { alert(result.error); return; }
            await loadSavedRaces();
            document.getElementById('saved-race-select').value = result.id;
            document.getElementById('btn-delete-race').style.display = '';
        }

        async function deleteSelectedRace() {
            const sel = document.getElementById('saved-race-select');
            const id = parseInt(sel.value);
            if (!id) return;
            if (!confirm('Delete this saved race?')) return;
            await fetch(`/api/saved-races/${id}`, { method: 'DELETE' });
            await loadSavedRaces();
            clearRaceForm();
        }

        // Set default date to today
        document.getElementById('manual-race-date').value = new Date().toISOString().split('T')[0];

        // Autocomplete setup
        function setupAutocomplete(inputId, listId, hiddenId, endpoint) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);
            const hidden = document.getElementById(hiddenId);
            let debounce;

            input.addEventListener('input', () => {
                clearTimeout(debounce);
                debounce = setTimeout(async () => {
                    const q = input.value.trim();
                    if (q.length < 2) { list.classList.remove('active'); return; }
                    const res = await fetch(`${endpoint}?q=${encodeURIComponent(q)}`);
                    const items = await res.json();
                    list.innerHTML = '';
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        const label = item.name || item.label;
                        const sub = item.distance ? `${item.distance}km` : (item.nationality || '');
                        div.innerHTML = `${label}${sub ? `<small>${sub}</small>` : ''}`;
                        div.onclick = () => {
                            input.value = label;
                            hidden.value = item.url;
                            list.classList.remove('active');
                        };
                        list.appendChild(div);
                    });
                    list.classList.toggle('active', items.length > 0);
                }, 250);
            });

            document.addEventListener('click', e => {
                if (!e.target.closest('.autocomplete-wrap')) list.classList.remove('active');
            });
        }

        setupAutocomplete('rider-a-input', 'rider-a-list', 'rider-a-url', '/api/riders');
        setupAutocomplete('rider-b-input', 'rider-b-list', 'rider-b-url', '/api/riders');
        setupAutocomplete('race-input', 'race-list', 'stage-url', '/api/races');

        async function predict() {
            const btn = document.getElementById('predict-btn');
            const err = document.getElementById('error');
            const results = document.getElementById('results');
            err.style.display = 'none';
            results.style.display = 'none';

            const riderA = document.getElementById('rider-a-url').value;
            const riderB = document.getElementById('rider-b-url').value;
            const oddsA = document.getElementById('odds-a').value;
            const oddsB = document.getElementById('odds-b').value;

            if (!riderA || !riderB) {
                err.textContent = 'Please select both riders.';
                err.style.display = 'block';
                return;
            }

            let body = {
                rider_a_url: riderA,
                rider_b_url: riderB,
                odds_a: oddsA || null,
                odds_b: oddsB || null,
            };

            if (raceMode === 'db') {
                const stageUrl = document.getElementById('stage-url').value;
                if (!stageUrl) {
                    err.textContent = 'Please select a race/stage from the database.';
                    err.style.display = 'block';
                    return;
                }
                body.stage_url = stageUrl;
            } else {
                const distance = parseFloat(document.getElementById('manual-distance').value);
                const vert = parseFloat(document.getElementById('manual-vert').value);
                if (!distance || distance <= 0) {
                    err.textContent = 'Please enter a valid distance.';
                    err.style.display = 'block';
                    return;
                }
                body.race_params = {
                    distance: distance,
                    vertical_meters: vert || 0,
                    profile_icon: document.getElementById('manual-profile').value,
                    stage_type: document.getElementById('manual-stage-type').value,
                    is_one_day_race: document.getElementById('manual-oneday').value === '1',
                    race_date: document.getElementById('manual-race-date').value || new Date().toISOString().split('T')[0],
                    race_base_url: document.getElementById('manual-race-url').value || null,
                    num_climbs: parseInt(document.getElementById('manual-climbs').value) || 0,
                };
            }

            btn.disabled = true;
            btn.textContent = 'Predicting...';

            try {
                const res = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (data.error) {
                    err.textContent = data.error;
                    err.style.display = 'block';
                    return;
                }

                // Display results
                document.getElementById('name-a').textContent = data.rider_a.name;
                document.getElementById('name-b').textContent = data.rider_b.name;
                document.getElementById('prob-a').textContent = data.rider_a.win_pct;
                document.getElementById('prob-b').textContent = data.rider_b.win_pct;

                const cardA = document.getElementById('card-a');
                const cardB = document.getElementById('card-b');
                cardA.classList.toggle('winner', data.rider_a.win_probability > 0.5);
                cardB.classList.toggle('winner', data.rider_b.win_probability > 0.5);

                // Kelly results
                const kellyDiv = document.getElementById('kelly-results');
                kellyDiv.innerHTML = '';

                [
                    {rider: data.rider_a, label: 'A'},
                    {rider: data.rider_b, label: 'B'},
                ].forEach(({rider, label}) => {
                    if (!rider.kelly) return;
                    const k = rider.kelly;
                    const edgeClass = k.edge > 0 ? 'positive' : k.edge < 0 ? 'negative' : 'neutral';
                    const evClass = k.expected_value > 0 ? 'positive' : 'negative';

                    kellyDiv.innerHTML += `
                        <div class="kelly-section">
                            <h3>Kelly Analysis — ${rider.name}</h3>
                            <div class="kelly-grid">
                                <div class="kelly-stat">
                                    <span class="value">${k.bookmaker_odds.toFixed(2)}</span>
                                    <span class="label">Bookmaker Odds</span>
                                </div>
                                <div class="kelly-stat">
                                    <span class="value">${(k.implied_prob * 100).toFixed(1)}%</span>
                                    <span class="label">Implied Prob</span>
                                </div>
                                <div class="kelly-stat">
                                    <span class="value ${edgeClass}">${k.edge_pct}</span>
                                    <span class="label">Edge</span>
                                </div>
                                <div class="kelly-stat">
                                    <span class="value ${evClass}">£${k.expected_value.toFixed(3)}</span>
                                    <span class="label">EV per £1</span>
                                </div>
                                <div class="kelly-stat">
                                    <span class="value">${(k.full_kelly * 100).toFixed(1)}%</span>
                                    <span class="label">Full Kelly</span>
                                </div>
                                <div class="kelly-stat">
                                    <span class="value positive">${(k.half_kelly * 100).toFixed(1)}%</span>
                                    <span class="label">½ Kelly (Rec.)</span>
                                </div>
                            </div>
                            <div class="kelly-verdict ${k.should_bet ? 'bet' : 'no-bet'}">
                                ${k.should_bet
                                    ? `✅ VALUE BET — Stake ${(k.half_kelly * 100).toFixed(1)}% of bankroll (½ Kelly)`
                                    : `❌ NO VALUE — Model sees no edge at these odds`}
                            </div>
                            ${k.should_bet ? `<button class="btn btn-primary" style="margin-top:0.8rem;width:100%;" onclick="logBet(this)" data-name="${rider.name.replace(/"/g, '&quot;')}" data-url="${rider.url || ''}" data-prob="${rider.win_probability}" data-odds="${k.bookmaker_odds}" data-kelly="${k.half_kelly}">📝 Log This Bet</button>` : ''}
                        </div>
                    `;
                });

                results.style.display = 'block';
            } catch(e) {
                err.textContent = 'Prediction failed: ' + e.message;
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Predict Head-to-Head';
            }
        }

        let _lastPrediction = {};
        async function logBet(btn) {
            const selName = btn.dataset.name;
            const selUrl = btn.dataset.url;
            const modelProb = parseFloat(btn.dataset.prob);
            const odds = parseFloat(btn.dataset.odds);
            const kellyFrac = parseFloat(btn.dataset.kelly);
            const bankroll = await fetch('/api/pnl/summary').then(r => r.json()).then(s => s.bankroll);
            if (!bankroll || bankroll <= 0) {
                alert('Set your bankroll first on the P&L page');
                return;
            }
            const stake = (kellyFrac * bankroll).toFixed(2);
            if (!confirm(`Log bet: ${selName} @ ${odds.toFixed(2)} — Stake £${stake} (½ Kelly)?`)) return;

            const riderAUrl = document.getElementById('rider-a-url').value;
            const riderBUrl = document.getElementById('rider-b-url').value;
            const riderAName = document.getElementById('rider-a-input').value;
            const riderBName = document.getElementById('rider-b-input').value;
            const stageUrl = raceMode === 'db' ? document.getElementById('stage-url').value : '';
            const raceName = raceMode === 'db' ? document.getElementById('race-input').value : document.getElementById('manual-race-name').value;
            const raceDate = raceMode === 'manual' ? document.getElementById('manual-race-date').value : new Date().toISOString().split('T')[0];

            const res = await fetch('/api/pnl/bet', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    stage_url: stageUrl, race_name: raceName, race_date: raceDate,
                    rider_a_url: riderAUrl, rider_a_name: riderAName,
                    rider_b_url: riderBUrl, rider_b_name: riderBName,
                    selection: selUrl || selName, selection_name: selName,
                    decimal_odds: odds, model_prob: modelProb,
                    kelly_fraction: kellyFrac, stake: parseFloat(stake),
                    model_used: 'calibrated_xgboost'
                })
            });
            const data = await res.json();
            if (data.error) { alert('Error: ' + data.error); return; }
            alert(`✅ Bet logged! Bankroll: £${data.bankroll.toFixed(2)}`);
        }

        // Load stats + saved races
        fetch('/api/stats').then(r => r.json()).then(s => {
            document.getElementById('stats-bar').textContent =
                `Database: ${s.races} races · ${s.stages} stages · ${s.results.toLocaleString()} results · ${s.riders} riders · Years: ${s.year_range}`;
        }).catch(() => {});
        loadSavedRaces();
    </script>
</body>
</html>
