<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&L Tracker — Cycling H2H</title>
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
            --accent: #f5c518; --green: #00c853; --red: #ff5252;
            --blue: #448aff; --text: #e8e8e8; --muted: #8a8d9b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }
        header { text-align: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
        header h1 span { color: var(--accent); }
        header nav a { color: var(--muted); text-decoration: none; margin: 0 0.5rem; font-size: 0.9rem; }
        header nav a:hover { color: var(--text); }
        header nav a.active { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; display: block; margin-bottom: 0.2rem; }
        .stat-card .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .positive { color: var(--green); }
        .negative { color: var(--red); }
        .neutral { color: var(--muted); }

        .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .chart-container h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; }
        canvas { width: 100% !important; height: 200px !important; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .section-header h2 { font-size: 1.1rem; }

        .bankroll-setup { background: var(--card); border: 1px solid var(--accent); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; text-align: center; }
        .bankroll-setup p { color: var(--muted); margin-bottom: 1rem; }
        .bankroll-setup input { padding: 0.7rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; width: 150px; text-align: center; }
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.75rem; }
        .btn-green { background: var(--green); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-muted { background: var(--border); color: var(--text); }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.6rem; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 0.6rem; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(255,255,255,0.02); }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .badge-won { background: rgba(0,200,83,0.15); color: var(--green); }
        .badge-lost { background: rgba(255,82,82,0.15); color: var(--red); }
        .badge-pending { background: rgba(245,197,24,0.15); color: var(--accent); }
        .badge-void { background: rgba(138,141,155,0.15); color: var(--muted); }

        @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚴 Cycling H2H <span>P&L Tracker</span></h1>
            <nav>
                <a href="/">Predictions</a>
                <a href="/results">Results</a>
                <a href="/pnl" class="active">P&L Tracker</a>
                <a href="/admin">Admin</a>
            </nav>
        </header>

        <div id="bankroll-setup" class="bankroll-setup" style="display:none;">
            <p>Set your starting bankroll to begin tracking</p>
            <input type="number" id="init-bankroll" placeholder="e.g. 1000" min="1" step="0.01">
            <button class="btn btn-primary" onclick="initBankroll()">Set Bankroll</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="value" id="s-bankroll">—</span>
                    <span class="label">Bankroll</span>
                </div>
                <div class="stat-card">
                    <span class="value" id="s-profit">—</span>
                    <span class="label">Total Profit</span>
                </div>
                <div class="stat-card">
                    <span class="value" id="s-roi">—</span>
                    <span class="label">ROI</span>
                </div>
                <div class="stat-card">
                    <span class="value" id="s-winrate">—</span>
                    <span class="label">Win Rate</span>
                </div>
                <div class="stat-card">
                    <span class="value" id="s-bets">—</span>
                    <span class="label">Settled Bets</span>
                </div>
                <div class="stat-card">
                    <span class="value" id="s-pending">—</span>
                    <span class="label">Pending</span>
                </div>
                <div class="stat-card">
                    <span class="value" id="s-edge">—</span>
                    <span class="label">Avg Edge</span>
                </div>
                <div class="stat-card">
                    <span class="value" id="s-staked">—</span>
                    <span class="label">Total Staked</span>
                </div>
            </div>

            <div class="chart-container">
                <h3>Bankroll Over Time</h3>
                <canvas id="bankroll-chart"></canvas>
            </div>

            <div class="section-header">
                <h2>Bet History</h2>
                <button class="btn btn-muted btn-sm" onclick="autoSettle()">Auto-Settle from Results</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Race</th>
                        <th>Matchup</th>
                        <th>Odds</th>
                        <th>Edge</th>
                        <th>Stake</th>
                        <th>P&L</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bet-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        function formatMatchup(b) {
            const nameA = b.rider_a_name || '—';
            const nameB = b.rider_b_name || '—';
            const sel = b.selection_name || '';
            const boldA = sel === nameA ? 'font-weight:700' : 'opacity:0.6';
            const boldB = sel === nameB ? 'font-weight:700' : 'opacity:0.6';
            return `<span style="${boldA}">${nameA}</span> <span style="opacity:0.4;font-size:0.85em">vs</span> <span style="${boldB}">${nameB}</span>`;
        }

        async function loadSummary() {
            const res = await fetch('/api/pnl/summary');
            const s = await res.json();

            if (s.bankroll === 0 && s.total_bets === 0 && s.bankroll_history.length === 0) {
                document.getElementById('bankroll-setup').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
                return;
            }

            document.getElementById('bankroll-setup').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            const fmt = (v) => `£${v.toFixed(2)}`;
            const pct = (v) => `${(v * 100).toFixed(1)}%`;
            const cls = (v) => v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral';

            document.getElementById('s-bankroll').textContent = fmt(s.bankroll);
            const profitEl = document.getElementById('s-profit');
            profitEl.textContent = fmt(s.total_profit);
            profitEl.className = `value ${cls(s.total_profit)}`;
            const roiEl = document.getElementById('s-roi');
            roiEl.textContent = pct(s.roi);
            roiEl.className = `value ${cls(s.roi)}`;
            document.getElementById('s-winrate').textContent = pct(s.win_rate);
            document.getElementById('s-bets').textContent = s.total_bets;
            document.getElementById('s-pending').textContent = s.pending_bets;
            document.getElementById('s-edge').textContent = pct(s.avg_edge);
            document.getElementById('s-staked').textContent = fmt(s.total_staked);

            drawChart(s.bankroll_history);
        }

        function drawChart(history) {
            const canvas = document.getElementById('bankroll-chart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = 200 * dpr;
            ctx.scale(dpr, dpr);
            const W = rect.width, H = 200;

            if (history.length < 2) {
                ctx.fillStyle = '#8a8d9b';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Place some bets to see your bankroll chart', W/2, H/2);
                return;
            }

            const vals = history.map(h => h.bankroll);
            const mn = Math.min(...vals) * 0.95;
            const mx = Math.max(...vals) * 1.05;
            const pad = {t: 10, b: 10, l: 10, r: 10};

            ctx.clearRect(0, 0, W, H);
            ctx.beginPath();
            ctx.strokeStyle = vals[vals.length-1] >= vals[0] ? '#00c853' : '#ff5252';
            ctx.lineWidth = 2;

            vals.forEach((v, i) => {
                const x = pad.l + (i / (vals.length - 1)) * (W - pad.l - pad.r);
                const y = pad.t + (1 - (v - mn) / (mx - mn)) * (H - pad.t - pad.b);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();

            // Fill area
            const lastX = pad.l + (W - pad.l - pad.r);
            const lastY = pad.t + (1 - (vals[vals.length-1] - mn) / (mx - mn)) * (H - pad.t - pad.b);
            ctx.lineTo(lastX, H - pad.b);
            ctx.lineTo(pad.l, H - pad.b);
            ctx.closePath();
            ctx.fillStyle = vals[vals.length-1] >= vals[0] ? 'rgba(0,200,83,0.08)' : 'rgba(255,82,82,0.08)';
            ctx.fill();
        }

        async function loadHistory() {
            const res = await fetch('/api/pnl/history?limit=50');
            const bets = await res.json();
            const tbody = document.getElementById('bet-table');
            tbody.innerHTML = '';

            bets.forEach(b => {
                const profitCls = b.profit > 0 ? 'positive' : b.profit < 0 ? 'negative' : 'neutral';
                const badgeCls = `badge-${b.status}`;
                const actions = b.status === 'pending' ? `
                    <button class="btn btn-green btn-sm" onclick="settleBet(${b.id}, true)">Won</button>
                    <button class="btn btn-red btn-sm" onclick="settleBet(${b.id}, false)">Lost</button>
                    <button class="btn btn-muted btn-sm" onclick="voidBet(${b.id})">Void</button>
                ` : '—';

                tbody.innerHTML += `<tr>
                    <td>${b.race_date || b.created_at?.split('T')[0] || '—'}</td>
                    <td>${b.race_name || '—'}</td>
                    <td>${formatMatchup(b)}</td>
                    <td>${b.decimal_odds?.toFixed(2) || '—'}</td>
                    <td>${b.edge ? (b.edge * 100).toFixed(1) + '%' : '—'}</td>
                    <td>£${b.stake?.toFixed(2) || '—'}</td>
                    <td class="${profitCls}">${b.status !== 'pending' ? '£' + b.profit?.toFixed(2) : '—'}</td>
                    <td><span class="badge ${badgeCls}">${b.status}</span></td>
                    <td>${actions}</td>
                </tr>`;
            });
        }

        async function initBankroll() {
            const val = document.getElementById('init-bankroll').value;
            if (!val || parseFloat(val) <= 0) return;
            await fetch('/api/pnl/bankroll', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({bankroll: parseFloat(val)})
            });
            loadSummary(); loadHistory();
        }

        async function settleBet(id, won) {
            await fetch('/api/pnl/settle', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({bet_id: id, won})
            });
            loadSummary(); loadHistory();
        }

        async function voidBet(id) {
            await fetch('/api/pnl/void', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({bet_id: id})
            });
            loadSummary(); loadHistory();
        }

        async function autoSettle() {
            const res = await fetch('/api/pnl/auto-settle', {method: 'POST'});
            const data = await res.json();
            if (data.settled > 0) alert(`Auto-settled ${data.settled} bet(s)`);
            else alert('No bets to auto-settle (results not yet scraped)');
            loadSummary(); loadHistory();
        }

        loadSummary(); loadHistory();
    </script>
</body>
</html>
